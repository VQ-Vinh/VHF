[general]
session_prefix = "session"
data_dir = "."
log_level = "INFO"
num_workers = 4

[audio]
capture_mode = "device"
sample_rate = 48000
channels = 1
dtype = "int16"
frame_size = 2048
device_index = -1

[vad]
backend = "silero"
min_speech_duration_ms = 300
min_silence_duration_ms = 1200
max_segment_duration_ms = 15000
threshold = 0.5
energy_threshold = 500
silero_model_path = ""

[backend]
api_url = "http://127.0.0.1:8080"
firebase_api_key = ""
google_oauth_client_id = "515336425252-aqkkoc9j9pmji0bsedg7g8hid398ee21.apps.googleusercontent.com"
timeout_seconds = 150

[translation]
enabled = true
source_language = "auto"
target_language = "en"

[storage]
retention_days = 14
cleanup_interval_hours = 24

[storage.local]
audio_dir = "./VHF_Storage/audio"
result_dir = "./VHF_Storage/results"
