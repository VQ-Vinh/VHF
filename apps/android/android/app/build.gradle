plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def releaseStoreFile = System.getenv("PRANA_ANDROID_KEYSTORE_PATH") ?: keystoreProperties.getProperty("storeFile")
def releaseStorePassword = System.getenv("PRANA_ANDROID_KEYSTORE_PASSWORD") ?: keystoreProperties.getProperty("storePassword")
def releaseKeyAlias = System.getenv("PRANA_ANDROID_KEY_ALIAS") ?: keystoreProperties.getProperty("keyAlias")
def releaseKeyPassword = System.getenv("PRANA_ANDROID_KEY_PASSWORD") ?: keystoreProperties.getProperty("keyPassword")
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every { it }
def productionReleaseRequested = gradle.startParameter.taskNames.any {
    def task = it.toLowerCase()
    task.contains("productionrelease") || task.endsWith("assemblerelease") || task.endsWith("bundlerelease")
}
if (productionReleaseRequested && !hasReleaseSigning) {
    throw new GradleException(
        "Production release signing is not configured. Set PRANA_ANDROID_KEYSTORE_* variables " +
        "or create android/key.properties."
    )
}

android {
    namespace = "com.dlv.prana_mobile"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    buildFeatures {
        resValues = true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.dlv.prana_mobile"
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    flavorDimensions += "environment"
    productFlavors {
        staging {
            dimension = "environment"
            applicationIdSuffix = ".staging"
            resValue "string", "app_name", "PRANA ELEX Staging"
        }
        production {
            dimension = "environment"
            resValue "string", "app_name", "PRANA ELEX"
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile = rootProject.file(releaseStoreFile)
                storePassword = releaseStorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter { source = "../.." }
